{% extends 'main/base.html' %}

    {% load compress %}
    
    {% load static %}
    
    {% block title %} |Sign Up {% endblock title %}


    {% block content %}  
        <main class="login-page mt-36">
            <h2 class="mt-10 mb-6 flex text-center justify-center text-2xl font-semibold border-b-2">Sign Up Here</h2>
            <form id="form-control" class="mt-10 bg-[#eee] mb-10 p-10 rounded-lg w-[90%]" action="." method="POST">
                {% csrf_token %}
                    
                <div class="login-box relative top-4 mt-6 mb-5 flex flex-col sm:flex sm:flex-col">
                    <label for="firstName" class="mb-4 font-semibold text-slate-500 hover:text-slate-800 text-xl">First Name:</label>
                    <input type="text" id="fname" name="fname" class="w-[80%] ml-8 sm:w-[60%] p-4 rounded-xl text-2xl bg-amber-100 text-gay-700 border-none outline-none" required> 
                    <span class="absolute top-15 left-0"><i class='bx bx-user text-teal-600 text-2xl font-semibold'></i></span>
                    <span class="absolute top-24 mt-4 mb-4 hidden">
                        <i class='bx bx-check text-2xl font-semibold text-green-700' id="success"></i>
                        <i class='bx bx-error-circle text-2xl font-semibold text-green-700' id="message"></i>
                        <i class='bx bx-x text-2xl font-semibold text-green-700' id="error"></i> 
                    </span>
                </div>
                <div class="login-box relative top-4 mt-6 mb-5 flex flex-col sm:flex sm:flex-col">
                    <label for="lname" class="mb-4 font-semibold text-slate-500 hover:text-slate-800 text-xl">Last Name:</label>
                    <input type="text" id="lname" name="lname" class="w-[80%] sm:w-[60%] ml-8 p-4 rounded-xl text-2xl bg-amber-100 text-gray-700 border-none outline-none" required> 
                    <span class="absolute top-15 left-0"><i class='bx bx-user text-teal-600 text-2xl font-semibold'></i></span>
                    <span class="absolute top-24 mt-4 mb-4 hidden">
                        <i class='bx bx-check text-2xl font-semibold text-green-700' id="success"></i>
                        <i class='bx bx-error-circle text-2xl font-semibold text-green-700' id="message"></i>
                        <i class='bx bx-x text-2xl font-semibold text-green-700' id="error"></i> 
                    </span>
                </div>
                <div class="login-box relative top-4 mt-6 mb-5 flex flex-col sm:flex sm:flex-col">
                    <label for="username" class="mb-4 font-semibold text-slate-500 hover:text-slate-800 text-xl">Username:</label>
                    <input type="text" id="username" name="username" class="w-[80%] ml-8 sm:w-[60%] p-4 rounded-xl text-2xl bg-amber-100 text-gray-700 border-none outline-none" required> 
                    <span class="absolute top-15 left-0"><i class='bx bx-user text-teal-600 text-2xl font-semibold'></i></span>
                    <span class="absolute top-24 mt-4 mb-4 hidden">
                        <i class='bx bx-check text-2xl font-semibold text-green-700' id="success"></i>
                        <i class='bx bx-error-circle text-2xl font-semibold text-green-700' id="message"></i>
                        <i class='bx bx-x text-2xl font-semibold text-green-700' id="error"></i> 
                    </span>
                </div>

                <div class="login-box relative top-4 mt-6 mb-5 flex flex-col sm:flex sm:flex-col">
                    <label for="email" class="mb-4 font-semibold text-slate-500 hover:text-slate-800 text-xl">Email:</label>
                    <input type="email" id="email" name="email" class="w-[80%] sm:w-[60%] ml-8 p-4 rounded-xl bg-amber-100 text-2xl text-gray-700 border-none outline-none" required> 
                    <span class="absolute top-15 left-0"><i class='bx bxs-envelope text-teal-600 text-2xl font-semibold'></i></span>
                    <span class="absolute top-24 mt-4 mb-4 hidden">
                        <i class='bx bx-check text-2xl font-semibold text-green-700' id="success"></i>
                        <i class='bx bx-error-circle text-2xl font-semibold text-green-700' id="message"></i>
                        <i class='bx bx-x text-2xl font-semibold text-green-700' id="error"></i> 
                    </span>
                </div>
                    
                <div class="login-box mt-14 mb-6 flex flex-col sm:flex sm:flex-col">
                    <label for="password" class="mb-4 font-semibold text-slate-500 hover:text-slate-800 text-xl">Password:</label>
                    <input type="password" id="password" name="password1" class="w-[80%] ml-8 sm:w-[60%] p-4 rounded-xl bg-amber-100 text-2xl text-gray-700 border-none outline-none" required> 
                    <span class="top-0 -mt-10"><i class='bx bxs-lock text-teal-600 text-2xl font-semibold'></i></span>
                    <span class="mt-4 mb-2 hidden sm:top-[68%]">
                        <i class='bx bx-check text-2xl font-semibold text-green-700' id="success"></i>
                        <i class='bx bx-error-circle text-2xl font-semibold text-green-700' id="message"></i>
                        <i class='bx bx-x text-2xl font-semibold text-green-700' id="error"></i> 
                    </span>
                </div>

                <div class="login-box mt-6 mb-6 flex flex-col sm:flex sm:flex-col">
                    <label for="password" class="mb-4 font-semibold text-slate-500 hover:text-slate-800 text-xl">Confirm Password:</label>
                    <input type="password" id="password" name="password2" class="w-[80%] sm:w-[60%] ml-8 p-4 rounded-xl bg-amber-100 text-2xl text-gray-700 border-none outline-none" required> 
                     <span class="top-0 -mt-10"><i class='bx bxs-lock text-teal-600 text-2xl font-semibold'></i></span>
                    <span class="mt-4 mb-3 hidden sm:top-[68%]">
                        <i class='bx bx-check text-2xl font-semibold text-green-700' id="success"></i>
                        <i class='bx bx-error-circle text-2xl font-semibold text-green-700' id="message"></i>
                        <i class='bx bx-x text-2xl font-semibold text-green-700' id="error"></i> 
                    </span>
                </div>
                    
                <div class="loxus mt-2">
                    <input type="checkbox" id="remember-me" name="remember-me">
                    <label for="remember-me">Remember me</label>
                </div>  
    
                <div class="loxus flex items-center justify-evenly gap-16 mt-2 mb-2">
                    <p>Have an account? <a href="{% url 'signup' %}" class="flex-nowrap text-xl font-semibold text-blue-600 hover:text-blue-900 transition-150 ease-in-out duration-150">Login</a></p> 
                    <a href="{% url 'forgot' %}" class="flex-nowrap text-xl font-semibold text-blue-600 hover:text-blue-900 transition-150 ease-in-out duration-150">Forgot Password?</a>
                </div>
    
                <input type="submit" class="btn px-8 py-4 bg-blue-600 w-[70%] mt-15 hover:bg-blue-900 transition ease-in-out duration-150 uppercase cursor-pointer text-white font-semibold rounded mb-10 mt-6 ml-10" value="sign up">
    
            </form>
        </main>    
   {% endblock content %}
